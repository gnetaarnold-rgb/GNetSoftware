<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Research: Intent Pivot</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #1a1a1a; color: #eee; text-align: center; }
        .container { border: 1px solid #444; padding: 20px; border-radius: 12px; background: #2a2a2a; }
        .btn { display: block; width: 100%; padding: 15px; background: #d32f2f; color: white; 
               text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 20px; border: none; font-size: 1.1em; }
        .btn:active { background: #b71c1c; }
        .status { margin-top: 15px; font-size: 0.8em; color: #888; }
        .code-box { background: #000; color: #0f0; padding: 10px; font-family: monospace; font-size: 0.7em; margin-top: 10px; text-align: left; overflow-x: auto; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Action: SET_NEW_PASSWORD</h2>
        <p>This test attempts to bypass the Settings main menu and jump directly to the Password/Pattern creation screen.</p>
        
        <button class="btn" onclick="launchIntent()">FORCE LAUNCH PIN SETUP</button>
        
        <div class="status" id="statusBox">Status: Waiting for user gesture...</div>
        
        <div class="code-box">
            Target: android.app.action.SET_NEW_PASSWORD<br>
            Package: com.android.settings
        </div>
    </div>

    <script>
        function launchIntent() {
            document.getElementById('statusBox').innerText = "Status: Sending Intent...";
            
            // Primary execution
            window.location.href = "intent:#Intent;action=android.app.action.SET_NEW_PASSWORD;package=com.android.settings;end";
            
            // Secondary execution loop (to attempt to catch a gap in the watchdog process)
            let attempts = 0;
            const interval = setInterval(() => {
                attempts++;
                if (attempts > 3) clearInterval(interval);
                window.location.replace("intent:#Intent;action=android.app.action.SET_NEW_PASSWORD;package=com.android.settings;end");
            }, 1500);
        }
    </script>

</body>
</html>
